name: "aih-sandbox-profile"
description: "Deterministic sandbox profile for remote project execution."
mode: ONCE
time_limit: 0
cwd: "/workspace"
hostname: "aih-runtime"
mount_proc: true
disable_no_new_privs: false
keep_env: true
envar: "HOME=/workspace"
envar: "NODE_ENV=production"
envar: "TZ=UTC"
envar: "LANG=C.UTF-8"
envar: "LC_ALL=C.UTF-8"
envar: "AIH_RUNTIME_PROFILES=codex,claude,gemini"
envar: "AIH_RUNTIME_PROFILE=codex"
iface_no_lo: true
rlimit_as: 4096
rlimit_cpu: 0
rlimit_fsize: 1024
rlimit_nofile: 4096
rlimit_nproc: 1024
disable_rl: false

mount {
  src: "/bin"
  dst: "/bin"
  is_bind: true
  rw: false
}

mount {
  src: "/usr"
  dst: "/usr"
  is_bind: true
  rw: false
}

mount {
  src: "/lib"
  dst: "/lib"
  is_bind: true
  rw: false
  mandatory: false
}

mount {
  src: "/lib64"
  dst: "/lib64"
  is_bind: true
  rw: false
  mandatory: false
}

mount {
  src: "/workspace"
  dst: "/workspace"
  is_bind: true
  rw: true
}

mount {
  src: "/tmp"
  dst: "/tmp"
  is_bind: true
  rw: true
  mandatory: false
}

mount {
  src: "/dev/null"
  dst: "/dev/null"
  is_bind: true
  rw: true
}

mount {
  src: "/dev/urandom"
  dst: "/dev/urandom"
  is_bind: true
  rw: false
}

seccomp_string: "LOG"
seccomp_string: "ERRNO(EPERM) { mount, umount, umount2, pivot_root, swapon, swapoff, init_module, finit_module, delete_module, reboot, kexec_load, open_by_handle_at, ptrace, process_vm_readv, process_vm_writev, keyctl, add_key, request_key, bpf, userfaultfd, perf_event_open }"
