name: desktop-macos-arm64-packaging

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'desktop/tauri/**'
      - 'scripts/release/build-macos-arm64.sh'
      - 'scripts/release/collect-macos-artifacts.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop-macos-arm64-packaging.yml'
  pull_request:
    paths:
      - 'desktop/tauri/**'
      - 'scripts/release/build-macos-arm64.sh'
      - 'scripts/release/collect-macos-artifacts.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop-macos-arm64-packaging.yml'

concurrency:
  group: desktop-macos-arm64-packaging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop/tauri

      - name: Build macOS arm64 package
        run: scripts/release/build-macos-arm64.sh

      - name: Collect macOS artifacts and checksums
        run: scripts/release/collect-macos-artifacts.sh

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-arm64
          path: dist/macos-arm64
          if-no-files-found: error
