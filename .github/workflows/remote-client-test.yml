name: remote-client-test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: remote-client-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-suite:
    name: Remote Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run remote test lane
        run: |
          set -euo pipefail
          node --test \
            test/remote.connector.resilience.test.js \
            test/remote.protocol.contract.test.js \
            test/remote.project-session.test.js \
            test/remote.runtime-isolation.test.js

  client-suite:
    name: Client Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run client/auth-session lane
        run: |
          set -euo pipefail
          node --test \
            test/proxy.entry.test.js \
            test/proxy.management-router.test.js \
            test/session.management.test.js
