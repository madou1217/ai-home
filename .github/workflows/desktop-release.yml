name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            artifact_name: desktop-bundle-macos
          - os: ubuntu-22.04
            label: Linux
            artifact_name: desktop-bundle-linux
          - os: windows-latest
            label: Windows
            artifact_name: desktop-bundle-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop/tauri/src-tauri
          args: --config desktop/tauri/src-tauri/tauri.conf.json
          includeDebug: false
          releaseDraft: false
          prerelease: false

      - name: Upload installable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: desktop/tauri/src-tauri/target/release/bundle/
          if-no-files-found: error
