name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            artifact_suffix: macos
          - os: ubuntu-22.04
            label: Linux
            artifact_suffix: linux
          - os: windows-latest
            label: Windows
            artifact_suffix: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight release config checks
        shell: bash
        run: |
          set -euo pipefail
          test -d desktop/tauri/src-tauri
          test -f desktop/tauri/src-tauri/tauri.conf.json

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop/tauri/src-tauri
          args: --config desktop/tauri/src-tauri/tauri.conf.json
          includeDebug: false
          releaseDraft: false
          prerelease: false

      - name: Validate Unix bundle outputs
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="desktop/tauri/src-tauri/target/release/bundle"
          test -d "${BUNDLE_DIR}"
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            FOUND="$(find "${BUNDLE_DIR}" -type f \( -iname "*.dmg" -o -iname "*.app.tar.gz" \) | head -n 1 || true)"
          else
            FOUND="$(find "${BUNDLE_DIR}" -type f \( -iname "*.appimage" -o -iname "*.deb" -o -iname "*.rpm" \) | head -n 1 || true)"
          fi
          if [[ -z "${FOUND}" ]]; then
            echo "No installable bundle found in ${BUNDLE_DIR}"
            exit 1
          fi
          echo "Validated bundle: ${FOUND}"

      - name: Validate Windows bundle outputs
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bundleDir = "desktop/tauri/src-tauri/target/release/bundle"
          if (!(Test-Path $bundleDir)) {
            Write-Error "Bundle directory missing: $bundleDir"
          }
          $files = Get-ChildItem -Path $bundleDir -Recurse -File -Include *.msi,*.exe
          if ($files.Count -eq 0) {
            Write-Error "No installable Windows bundle found in $bundleDir"
          }
          Write-Host "Validated bundle: $($files[0].FullName)"

      - name: Upload installable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundle-${{ matrix.artifact_suffix }}
          path: desktop/tauri/src-tauri/target/release/bundle/
          if-no-files-found: error
